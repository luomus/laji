<h1>{{ 'speciesSelection.title' | translate }}</h1>
<p>
  {{ 'speciesSelection.description' | translate }}
</p>
<div class="mb-3">
  <button class="btn btn-success" [disabled]="selectedSpecies.length < 1" (click)="onConfirm()">
    {{ 'siteSelection.confirm' | translate }}
  </button>
</div>
<div class="row mb-2">
  <div class="col-sm-3">
    <label>{{ 'siteSelection.site' | translate }}</label>
    <select class="form-control input-sm" [(ngModel)]="selectedSite" (ngModelChange)="siteChange.emit($event)">
      <option [value]="undefined"></option>
      @for (site of sites; track site) {
        <option [value]="site.id">{{ site.id }} {{ site.name }}</option>
      }
    </select>
  </div>
</div>

<bsg-species-table
  [species]="species || []"
  [unknownSpeciesRecordingCount]="unknownSpeciesRecordingCount || 0"
  [loading]="!species"
  [height]="height"
  [(selectedSpecies)]="selectedSpecies"
></bsg-species-table>

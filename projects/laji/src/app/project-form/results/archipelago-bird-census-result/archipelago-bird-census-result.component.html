<div class="container-fluid">
  <laji-project-form-header [form]="form"></laji-project-form-header>
  <div class="row">
    @if (state$ | async; as state) {
      <laji-navigation-thumbnail
        name="birdPointCount.stats.chart.title"
        icon="wb_icon_laskennat"
        iconType="png"
        [query]="{tab: Tabs.statistics}"
        >
      </laji-navigation-thumbnail>
      <laji-navigation-thumbnail
        name="birdPointCount.stats.map.title"
        icon="wb_icon_map_2"
        iconType="png"
        [query]="{tab: Tabs.map}"
        >
      </laji-navigation-thumbnail>
    }
  </div>
  @if (state$ | async; as state) {
    @if (isStatisticsState(state)) {
      <div>
        <laji-archipelago-bird-census-result-stats
          [collectionStartYear]="2019"
          [year]="state.year"
          (yearChange)="onYearChange($event)"
          [route]="state.route"
          (routeChange)="onRouteChange($event)"
          [namedPlace]="state.namedPlace"
          (namedPlaceChange)="onNamedPlaceChange($event)"
          >
        </laji-archipelago-bird-census-result-stats>
      </div>
    }
    @if (isMapState(state)) {
      <div>
        <laji-result-map
          [collections]="collections"
          [taxon]="state.taxon"
          (taxonChange)="onTaxonChange($event)"
          [taxonOptions]="taxonOptions$ | async"
          [year]="state.year"
          (yearChange)="onYearChange($event)"
          [mapQuery]="mapQuery"
          gatheringCountLabel="laji-map.legend.mode.birdGatheringCount"
          [collectionStartYear]="2019"
          >
        </laji-result-map>
      </div>
    }
  }
</div>
